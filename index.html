<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>44th Croydon Air Scouts – AGM Slideshow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Official UK Scout Brand Colors */
      --scout-purple: #7413dc;
      --deep-purple: #511482;
      --scout-teal: #00a794;
      --scout-green: #23a950;
      --white: #ffffff;
      --off-white: #f3f4f6;
      --muted: #cbd5e1;
      --slide-radius: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--scout-purple);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 14px 28px;
      background: var(--deep-purple);
      border-bottom: 3px solid var(--scout-teal);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .badge {
      width: 50px;
      height: 50px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .badge svg { width: 100%; height: 100%; }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 3.5vw, 2.1rem);
      letter-spacing: 0.06em;
      color: var(--white);
      line-height: 1;
    }

    header p {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .slide-counter {
      margin-left: auto;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--scout-teal);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ── Stage ───────────────────────────────────── */
    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #3e0b78; /* Slightly deeper visual anchor for the slides area */
    }

    /* ── Slides ──────────────────────────────────── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.7s ease, transform 0.7s ease;
      transform: scale(1.03);
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .slide.exit {
      opacity: 0;
      transform: scale(0.97);
    }

    /* Photo slides */
    .slide-photo img {
      max-height: calc(100dvh - 180px);
      max-width: 100%;
      object-fit: contain;
      border-radius: var(--slide-radius);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      display: block;
    }

    /* Caption overlay */
    .caption {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(transparent, rgba(62,11,120,0.95) 50%);
      width: 100%;
      max-width: 900px;
      padding: 50px 32px 20px;
      text-align: center;
      border-radius: 0 0 var(--slide-radius) var(--slide-radius);
    }

    .caption h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 0.06em;
      color: var(--white);
    }

    .caption p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.06em;
    }

    /* Title / info slides */
    .slide-title {
      flex-direction: column;
      text-align: center;
      padding: 40px;
    }

    .slide-title .big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: 0.04em;
      color: var(--white);
      line-height: 0.95;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .slide-title .sub {
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 16px;
    }

    .slide-title .rule {
      width: 80px;
      height: 3px;
      background: var(--scout-teal);
      margin: 24px auto;
      border-radius: 2px;
    }

    .slide-title .detail {
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.08em;
      color: var(--scout-teal);
    }

    /* Placeholder slide */
    .slide-placeholder {
      flex-direction: column;
      gap: 20px;
      text-align: center;
      padding: 40px;
      border: 2px dashed rgba(255,255,255,0.2);
      margin: 40px;
      border-radius: var(--slide-radius);
      background: rgba(255,255,255,0.03);
    }

    .slide-placeholder .icon {
      font-size: 4rem;
      opacity: 0.7;
    }

    .slide-placeholder h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      color: var(--white);
    }

    .slide-placeholder p {
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.6;
    }

    /* ── Controls ────────────────────────────────── */
    .controls {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 14px 20px;
      background: var(--deep-purple);
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .btn {
      background: transparent;
      border: 2px solid var(--scout-teal);
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      padding: 6px 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .btn:hover {
      background: var(--scout-teal);
      color: var(--white);
    }

    .btn-icon {
      padding: 6px 16px;
      font-size: 1.1rem;
    }

    .play-pause {
      background: var(--scout-green);
      color: var(--white);
      border-color: var(--scout-green);
    }

    .play-pause:hover {
      background: #2ec15d;
      border-color: #2ec15d;
      color: var(--white);
    }

    /* progress dots */
    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 280px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
      flex-shrink: 0;
    }

    .dot.active {
      background: var(--scout-teal);
      transform: scale(1.4);
    }

    /* progress bar */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--scout-teal);
      width: 0%;
      transition: width linear;
      z-index: 20;
    }

    /* ── Keyboard hint ───────────────────────────── */
    .hint {
      position: absolute;
      bottom: 58px;
      right: 18px;
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.6;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ── Upload overlay ──────────────────────────── */
    .drop-zone {
      position: absolute;
      inset: 0;
      background: rgba(81,20,130,0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .drop-zone.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .drop-zone .big-icon { font-size: 5rem; }
    .drop-zone h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--white);
      letter-spacing: 0.1em;
    }
    .drop-zone p { color: var(--muted); font-size: 0.85rem; }

    /* ── Edit / add photo button ─────────────────── */
    .edit-bar {
      position: absolute;
      top: 12px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 20;
    }

    .edit-btn {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s, border-color 0.2s;
    }

    .edit-btn:hover { 
      background: rgba(255,255,255,0.15); 
      border-color: var(--white);
    }

    /* hidden file input */
    #fileInput { display: none; }
  </style>
</head>
<body>

<header>
  <div class="badge">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50,5 C50,5 39,26 39,39 C39,49 46,51 50,60 C54,51 61,49 61,39 C61,26 50,5 50,5 Z" fill="#ffffff"/>
      <path d="M46,55 C35,53 23,43 14,48 C6,52 14,64 26,62 C38,60 44,57 46,55 Z" fill="#ffffff"/>
      <path d="M54,55 C65,53 77,43 86,48 C94,52 86,64 74,62 C62,60 56,57 54,55 Z" fill="#ffffff"/>
      <path d="M33,65 C33,65 42,68 50,68 C58,68 67,65 67,65 C67,65 65,74 50,74 C35,74 33,65 33,65 Z" fill="#ffffff"/>
      <rect x="42" y="62" width="16" height="4" rx="1" fill="#ffffff"/>
    </svg>
  </div>

  <div>
    <h1>44th Croydon Air Scouts</h1>
    <p>Annual General Meeting &nbsp;·&nbsp; Photo Slideshow</p>
  </div>

  <div class="slide-counter" id="slideCounter">1 / 1</div>
</header>

<div class="stage" id="stage">
  <div class="progress-bar" id="progressBar"></div>
  <div class="edit-bar">
    <button class="edit-btn" onclick="document.getElementById('fileInput').click()">＋ Add Photos</button>
  </div>

  <div class="slide slide-title active" id="slide-0">
    <div>
      <div class="big">44th Croydon<br>Air Scouts</div>
      <div class="rule"></div>
      <div class="detail">Annual General Meeting</div>
      <div class="sub" style="margin-top:10px;">Welcome &nbsp;·&nbsp; Skills for Life</div>
    </div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="big-icon">📸</div>
    <h2>Drop Photos Here</h2>
    <p>JPG, PNG, WEBP — drop multiple files at once</p>
  </div>

  <div class="hint">← → Arrow Keys &nbsp;|&nbsp; Space to Play/Pause</div>
</div>

<div class="controls">
  <button class="btn btn-icon" id="btnPrev" onclick="changeSlide(-1)" title="Previous">◀</button>
  <button class="btn play-pause" id="btnPlay" onclick="togglePlay()" title="Play/Pause">▶</button>
  <button class="btn btn-icon" id="btnNext" onclick="changeSlide(1)" title="Next">▶▶</button>
  <div class="dots" id="dots"></div>
</div>

<input type="file" id="fileInput" accept="image/*" multiple>

<script>
  // ── State ────────────────────────────────────────
  const slides = [
    { type: 'title' } // the opening title card
  ];

  // Placeholder slides (replace with real photo objects later)
  const placeholders = [
    { caption: 'Opening Ceremony',   hint: 'Drop a photo here or use + Add Photos' },
    { caption: 'Scout Activities',   hint: 'Drop a photo here or use + Add Photos' },
    { caption: 'Awards & Badges',    hint: 'Drop a photo here or use + Add Photos' },
    { caption: 'Group Photo',        hint: 'Drop a photo here or use + Add Photos' },
  ];

  placeholders.forEach(p => slides.push({ type: 'placeholder', ...p }));

  // Closing slide
  slides.push({ type: 'end' });

  let current = 0;
  let playing = false;
  let timer = null;
  const AUTO_DURATION = 5000; // ms per slide

  // ── DOM refs ─────────────────────────────────────
  const stage      = document.getElementById('stage');
  const dotsEl     = document.getElementById('dots');
  const counter    = document.getElementById('slideCounter');
  const progressBar= document.getElementById('progressBar');
  const btnPlay    = document.getElementById('btnPlay');
  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');

  // ── Render slides ────────────────────────────────
  function buildSlides() {
    // Remove all slides except the first built one (index 0 = title, always in HTML)
    stage.querySelectorAll('.slide:not(#slide-0)').forEach(el => el.remove());

    slides.forEach((s, i) => {
      if (i === 0) return; // title already in HTML

      const el = document.createElement('div');
      el.id = `slide-${i}`;
      el.className = 'slide';

      if (s.type === 'photo') {
        el.classList.add('slide-photo');
        el.innerHTML = `
          <img src="${s.src}" alt="${s.caption || ''}">
          ${s.caption ? `<div class="caption"><h2>${s.caption}</h2>${s.subcaption ? `<p>${s.subcaption}</p>` : ''}</div>` : ''}
        `;
      } else if (s.type === 'placeholder') {
        el.classList.add('slide-placeholder');
        el.innerHTML = `
          <div class="icon">⚜️</div>
          <h3>${s.caption}</h3>
          <p>${s.hint}</p>
        `;
        el.addEventListener('click', () => fileInputForSlot = i || null);
      } else if (s.type === 'end') {
        el.classList.add('slide-title');
        el.innerHTML = `
          <div>
            <div class="big" style="font-size:clamp(2rem,7vw,5rem);">Thank You</div>
            <div class="rule"></div>
            <div class="detail">44th Croydon Air Scouts</div>
            <div class="sub" style="margin-top:10px;">Skills for Life</div>
          </div>`;
      }

      stage.insertBefore(el, dropZone);
    });

    buildDots();
    updateCounter();
  }

  function buildDots() {
    dotsEl.innerHTML = '';
    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === current ? ' active' : '');
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });
  }

  function updateCounter() {
    counter.textContent = `${current + 1} / ${slides.length}`;
  }

  function goTo(idx, direction) {
    if (idx < 0 || idx >= slides.length) return;

    const prev = document.getElementById(`slide-${current}`);
    const next = document.getElementById(`slide-${idx}`);

    if (prev) prev.classList.remove('active');
    current = idx;
    if (next) {
      next.classList.add('active');
    }

    dotsEl.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
    updateCounter();

    if (playing) resetProgress();
  }

  function changeSlide(dir) {
    const next = (current + dir + slides.length) % slides.length;
    goTo(next);
  }

  // ── Autoplay ─────────────────────────────────────
  function startProgress() {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        progressBar.style.transition = `width ${AUTO_DURATION}ms linear`;
        progressBar.style.width = '100%';
      });
    });
  }

  function resetProgress() {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    clearTimeout(timer);
    startProgress();
    timer = setTimeout(() => {
      changeSlide(1);
    }, AUTO_DURATION);
  }

  function togglePlay() {
    playing = !playing;
    btnPlay.textContent = playing ? '⏸' : '▶';
    if (playing) {
      resetProgress();
    } else {
      clearTimeout(timer);
      progressBar.style.transition = 'none';
      progressBar.style.width = '0%';
    }
  }

  // ── Keyboard ─────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { changeSlide(1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { changeSlide(-1); }
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
  });

  // ── Fullscreen ───────────────────────────────────
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }

  // ── Drag & Drop photos ───────────────────────────
  stage.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('visible');
  });

  stage.addEventListener('dragleave', e => {
    if (!stage.contains(e.relatedTarget)) dropZone.classList.remove('visible');
  });

  stage.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('visible');
    handleFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    handleFiles([...fileInput.files]);
    fileInput.value = '';
  });

  function handleFiles(files) {
    const imgs = files.filter(f => f.type.startsWith('image/'));
    if (!imgs.length) return;

    const endIdx = slides.findIndex(s => s.type === 'end');
    const phCount = slides.filter(s => s.type === 'placeholder').length;

    imgs.forEach((file, fi) => {
      const url = URL.createObjectURL(file);
      const name = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
      const newSlide = { type: 'photo', src: url, caption: name };

      const firstPH = slides.findIndex(s => s.type === 'placeholder');
      if (firstPH !== -1) {
        slides.splice(firstPH, 1, newSlide);
      } else {
        const endI = slides.findIndex(s => s.type === 'end');
        slides.splice(endI, 0, newSlide);
      }
    });

    buildSlides();
    goTo(current);
  }

  // ── Touch / swipe ─────────────────────────────────
  let touchStartX = 0;
  stage.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  stage.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) changeSlide(dx < 0 ? 1 : -1);
  });

  // ── Init ─────────────────────────────────────────
  buildSlides();
  goTo(0);
</script>
</body>
</html>
